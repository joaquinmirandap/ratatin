<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Portafolio</title>

  <style>
    body {
      background-image: url("fondo.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    /* Capa oscura para mejorar lectura */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .container {
      margin-top: 50px;
      padding: 20px;
      border-top: 3px solid red;
      border-bottom: 3px solid red;
    }

    h1 {
      color: red;
    }

    p {
      font-size: 20px;
    }

    img {
      margin-top: 20px;
      width: 150px;
    }

    a {
      color: red;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>hola mundo jeje</h1>
    
    <p>Visca el Barça</p>

    <img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg" alt="Escudo Barcelona">

    <p style="margin-top: 30px;">
      me gusta 
      <a href="https://www.youtube.com/@RatatinGaming" target="_blank">
        ratatin gaming
      </a>
    </p>
  </div>

</body>
</html>
